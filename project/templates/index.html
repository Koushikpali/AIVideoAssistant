<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="page-wrapper">

    <header>
      <h1>AI Video Assistant</h1>
      <p class="subtitle">Process any YouTube video or local file and chat with its content.</p>
    </header>

    <section class="input-section">
      <div class="input-group">
        <label for="source">YouTube URL or Local File Path</label>
        <input
          type="text"
          id="source"
          placeholder="https://youtube.com/watch?v=... or /path/to/file.mp4"
        />
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="language">Language</label>
          <select id="language">
            <option value="english">English</option>
            <option value="hinglish">Hinglish</option>
          </select>
        </div>

        <button id="process-btn" onclick="processVideo()">Process Video</button>
      </div>

      <p id="loading-text" class="loading-text hidden">Processing... this may take a few minutes.</p>
      <p id="error-text" class="error-text hidden"></p>
    </section>

    <section id="results-section" class="results-section hidden">

      <div class="card" id="card-title">
        <div class="card-label">Video Title</div>
        <div class="card-content" id="result-title"></div>
      </div>

      <div class="card" id="card-summary">
        <div class="card-label">Summary</div>
        <div class="card-content" id="result-summary"></div>
      </div>

      <div class="card" id="card-actions">
        <div class="card-label">Action Items</div>
        <div class="card-content" id="result-actions"></div>
      </div>

      <div class="card" id="card-decisions">
        <div class="card-label">Key Decisions</div>
        <div class="card-content" id="result-decisions"></div>
      </div>

      <div class="card" id="card-questions">
        <div class="card-label">Open Questions</div>
        <div class="card-content" id="result-questions"></div>
      </div>

    </section>

    <section id="chat-section" class="chat-section hidden">
      <h2 class="chat-heading">Chat with this Video</h2>

      <div id="chat-history" class="chat-history"></div>

      <div class="chat-input-row">
        <input
          type="text"
          id="chat-input"
          placeholder="Ask a question about this video..."
          onkeydown="handleChatKey(event)"
        />
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </section>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
